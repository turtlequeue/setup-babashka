# name: Self check

on: [push]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        babashka-version: [0.5.0, 1.3.188]
    steps:
      - name: Setup Babashka
        id: setup-babashka
        uses: turtlequeue/setup-babashka@main
        with:
          babashka-version: ${{ matrix.babashka-version }}

      - name: Check if bb runs fine
        run: bb --version

      - name: Setup Babashka from cache
        id: setup-babashka-2
        uses: turtlequeue/setup-babashka@main
        with:
          babashka-version: ${{ matrix.babashka-version }}

      - name: Test Cache
        run: |
          if [ "${{ steps.setup-babashka-1.outputs.cache-hit }}" != "true" ] && [ "${{ steps.setup-babashka-2.outputs.cache-hit }}" != "true" ]; then
            echo "Cache not used. Failing the job."
            exit 1
          fi
        shell: bash

      - name: Check if bb runs fine from cache
        run: bb --version
